# Stack LOCALE de développement (app + base de données).
# La stack de PRODUCTION (avec Nginx + supervision) sera dans deploy/docker-compose.yml.
#
# Démarrage :  docker compose up --build
# Arrêt      :  docker compose down           (garde les données)
#              docker compose down -v         (supprime aussi le volume)

services:
  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    image: cloudops-ticketing:local
    environment:
      # L'app se connecte à PostgreSQL (et non SQLite) grâce à cette URL.
      DATABASE_URL: postgresql+psycopg://ticket:${POSTGRES_PASSWORD:-changeme}@postgres:5432/ticketing
    depends_on:
      postgres:
        condition: service_healthy   # n'attend que quand la base est prête
    ports:
      - "8000:8000"
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ticket
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ticketing
    volumes:
      - pgdata:/var/lib/postgresql/data   # persistance des données
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticket -d ticketing"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
