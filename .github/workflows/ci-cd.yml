name: CI/CD

# Déclenché à chaque push sur main (et lançable à la main).
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}   # ghcr.io/mikail-halil/cloudops-ticketing

jobs:
  # 1) Tests automatisés (environnement de test)
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Installer les dépendances
        run: pip install -r app/requirements.txt
      - name: Lancer pytest
        run: pytest -q

  # 2) Build de l'image Docker + push sur GHCR
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # OBLIGATOIRE pour pousser sur GHCR
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Connexion à GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # jeton intégré, pas de PAT
      - name: Metadonnees image (tags sha + latest)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha
            type=raw,value=latest
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: app/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 3) Déploiement sur la VM Azure via SSH
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Déploiement SSH (pull image + redémarrage + healthcheck)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd ~/cloudops-ticketing
            git pull --ff-only
            cd deploy
            docker compose pull
            docker compose up -d
            # Healthcheck avec ré-essais : après recréation du conteneur applicatif,
            # Nginx peut mettre jusqu'à ~10 s (TTL du resolver) à réapprendre son adresse.
            sleep 5
            for i in $(seq 1 12); do
              if curl -fsS http://localhost/health; then echo " -> déploiement OK"; exit 0; fi
              echo "tentative $i : application pas encore prête, nouvelle vérification dans 5 s..."
              sleep 5
            done
            echo "Healthcheck en échec après plusieurs tentatives"; exit 1
