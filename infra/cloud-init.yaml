#cloud-config
# Exécuté UNE FOIS au premier démarrage de la VM : installe Docker Engine
# + le plugin Docker Compose, puis autorise l'utilisateur azureuser à
# utiliser docker sans sudo.
#
# Débogage sur la VM si besoin :
#   cloud-init status --wait          (attend la fin)
#   sudo cat /var/log/cloud-init-output.log

package_update: true

runcmd:
  # Dépôt officiel Docker (format deb822, recommandé en 2026)
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - |
    cat > /etc/apt/sources.list.d/docker.sources <<EOF
    Types: deb
    URIs: https://download.docker.com/linux/ubuntu
    Suites: $(. /etc/os-release && echo "${UBUNTU_CODENAME:-$VERSION_CODENAME}")
    Components: stable
    Architectures: $(dpkg --print-architecture)
    Signed-By: /etc/apt/keyrings/docker.asc
    EOF
  - apt-get update -y
  - DEBIAN_FRONTEND=noninteractive apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - systemctl enable --now docker
  - usermod -aG docker azureuser
