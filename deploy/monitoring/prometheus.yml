global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  # Prometheus se surveille lui-même
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Métriques de l'hôte (CPU, RAM, disque, réseau)
  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']

  # Métriques par conteneur (cAdvisor)
  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

  # Métriques applicatives FastAPI (/metrics)
  - job_name: fastapi-app
    metrics_path: /metrics
    static_configs:
      - targets: ['app:8000']

  # Disponibilité HTTP externe (blackbox) : sonde /health et Nginx
  - job_name: blackbox-http
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://app:8000/health
          - http://nginx:80
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
