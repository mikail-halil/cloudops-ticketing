# Stack de PRODUCTION déployée sur la VM Azure.
# Nginx (reverse proxy, port 80) -> FastAPI (app) -> PostgreSQL (volume persistant).
# La supervision (Prometheus/Grafana/exporters) sera ajoutée en J5.
#
# Démarrage sur la VM (depuis la racine du dépôt cloné) :
#   docker compose -f deploy/docker-compose.yml up -d --build

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped

  app:
    # En production, l'image est tirée depuis GHCR (publiée par la CI/CD).
    # Le bloc build reste pour pouvoir construire en local si besoin.
    image: ghcr.io/mikail-halil/cloudops-ticketing:latest
    build:
      context: ..                 # racine du dépôt (le Dockerfile fait COPY app/)
      dockerfile: app/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://ticket:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD manquant}@postgres:5432/ticketing
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    # L'app n'est PAS exposée directement : seul Nginx l'atteint via le réseau interne Docker.

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ticket
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD manquant}
      POSTGRES_DB: ticketing
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticket -d ticketing"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------- SUPERVISION (J5) ----------
  prometheus:
    image: prom/prometheus:v3.2.1
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prom_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
    ports:
      - "9090:9090"
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.10.2
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    command:
      - '--housekeeping_interval=10s'
      - '--docker_only=true'
    restart: unless-stopped

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.27.0
    volumes:
      - ./monitoring/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.5.2
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?GRAFANA_PASSWORD manquant}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  pgdata:
  prom_data:
  grafana_data:
