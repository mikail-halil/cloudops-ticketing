# Reverse proxy Nginx : expose l'application sur le port 80,
# masque le port interne 8000 (l'app n'est jamais jointe en direct depuis Internet).

server {
    listen 80;
    server_name _;

    # Résolveur DNS interne de Docker (127.0.0.11) : Nginx re-résout le nom
    # 'app' dynamiquement. Sans ça, il mémorise l'IP au démarrage et garde
    # l'ancienne quand la CI/CD recrée le conteneur app -> erreurs 502.
    resolver 127.0.0.11 valid=10s;

    # Sonde simple pour vérifier que Nginx lui-même répond
    location = /nginx-health {
        return 200 "nginx ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        # host en variable => proxy_pass passe par le resolver à chaque requête
        set $upstream app:8000;
        proxy_pass http://$upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
